{% extends "base.html" %}
{% block title %}Giveaway — ItemZ{% endblock %}

{% block content %}
<div class="space-y-4">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:0.75rem;flex-wrap:wrap;">
      <div>
        <h1 style="margin:0;font-size:1.35rem;">🎉 Giveaway</h1>
        <p style="margin:0.35rem 0 0;color:var(--muted);font-size:0.9rem;">One entry per user. Winner is picked at random when the giveaway ends.</p>
      </div>
      <div style="display:flex;gap:0.55rem;flex-wrap:wrap;">
        <button id="gw-enter-btn" class="btn btn-primary">Enter Giveaway</button>
        <button id="gw-refresh-btn" class="btn btn-secondary">Refresh</button>
      </div>
    </div>

    <div id="gw-status" style="margin-top:1rem;color:var(--muted);">Loading giveaway…</div>
    <div id="gw-counts" style="margin-top:0.65rem;font-size:0.88rem;color:#d9d9df;"></div>
  </div>

  <div class="card">
    <h3 style="margin-bottom:0.7rem;">Recent Entries</h3>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr><th>#</th><th>User</th><th>Source</th><th>Joined</th></tr>
        </thead>
        <tbody id="gw-entries-body">
          <tr class="empty-row"><td colspan="4">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let giveawayData = null;

  const statusEl = document.getElementById('gw-status');
  const countsEl = document.getElementById('gw-counts');
  const entriesBodyEl = document.getElementById('gw-entries-body');
  const enterBtn = document.getElementById('gw-enter-btn');
  const refreshBtn = document.getElementById('gw-refresh-btn');

  function fmtDate(ts) {
    if (!ts) return '—';
    return new Date(ts * 1000).toLocaleString();
  }

  function fmtMoney(cents) {
    return '$' + ((cents || 0) / 100).toFixed(2);
  }

  function escapeHtml(v) {
    return String(v || '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function renderEntries() {
    const rows = Array.isArray(giveawayData?.entries_preview) ? giveawayData.entries_preview : [];
    if (!rows.length) {
      entriesBodyEl.innerHTML = '<tr class="empty-row"><td colspan="4">No entries yet.</td></tr>';
      return;
    }
    entriesBodyEl.innerHTML = rows.map(r => {
      const source = r.source === 'organic'
        ? 'User'
        : (r.source === 'admin_manual' ? 'Admin' : (r.source === 'legacy_migrated' ? 'Legacy' : 'Other'));
      return `<tr>
        <td>#${r.rank || '—'}</td>
        <td style="color:var(--text);font-weight:600;">${escapeHtml(r.username)}</td>
        <td>${source}</td>
        <td>${fmtDate(r.joined_at)}</td>
      </tr>`;
    }).join('');
  }

  function renderStatus() {
    const active = giveawayData?.active;
    if (!active) {
      statusEl.textContent = 'No giveaway is currently configured.';
      countsEl.textContent = '';
      enterBtn.disabled = true;
      return;
    }

    const winner = active.winner
      ? ` | Winner: ${escapeHtml(active.winner.username)}`
      : '';
    statusEl.innerHTML = `Reward: <strong>${fmtMoney(active.reward_cents)}</strong> | Starts: ${fmtDate(active.starts_at)} | Ends: ${fmtDate(active.ends_at)}${winner}`;

    countsEl.innerHTML = `Total joined: <strong>${active.total_joined || 0}</strong> | User joins: <strong>${active.organic_joined || 0}</strong> | Other joins: <strong>${active.auto_joined || 0}</strong> | Auto/min: <strong>${active.auto_join_per_minute || 0}</strong>`;

    if (active.ended || !active.active_now) {
      enterBtn.disabled = true;
      return;
    }
    if (!active.eligible) {
      enterBtn.disabled = true;
      return;
    }
    enterBtn.disabled = !!active.has_entered;
    if (active.has_entered) {
      countsEl.innerHTML += ' | <strong style="color:#0EF475;">You are entered.</strong>';
    }
  }

  async function loadGiveaway() {
    try {
      const res = await fetch('/api/giveaway/status');
      giveawayData = await res.json();
      renderStatus();
      renderEntries();
    } catch (e) {
      statusEl.textContent = 'Failed to load giveaway.';
    }
  }

  async function enterGiveaway() {
    const res = await fetch('/api/giveaway/enter', { method: 'POST' });
    const data = await res.json();
    if (!res.ok || data.error) {
      alert(data.error || 'Failed to enter giveaway.');
      return;
    }
    giveawayData = data;
    renderStatus();
    renderEntries();
    alert(data.already_entered ? 'You are already entered.' : 'You are now entered!');
  }

  enterBtn.addEventListener('click', enterGiveaway);
  refreshBtn.addEventListener('click', loadGiveaway);
  loadGiveaway();
  setInterval(loadGiveaway, 15000);
</script>
{% endblock %}
