{% extends "base.html" %}
{% block title %}Account Deleted — Konvy Accounts{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
  <div class="glass-panel rounded-2xl p-8 max-w-md w-full text-center">
    <div class="text-[56px] mb-4 opacity-30">🗑️</div>
    <h1 class="font-space text-xl font-bold text-white mb-2">Account Deleted</h1>
    <p class="text-sm text-zinc-400 mb-6">This account (#{{ item_id }}) has been removed by the seller or administration and is no longer available.</p>
    <a href="{{ url_for('dashboard') }}" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-cyan-500/10 border border-cyan-500/20 text-cyan-300 font-semibold text-sm hover:bg-cyan-500/20 transition-colors">
      <i class="ri-arrow-left-line"></i> Back to Marketplace
    </a>
  </div>
</div>
{% endblock %}
