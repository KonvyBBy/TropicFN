<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konvy Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f2fbff;
      --card: #ffffff;
      --text: #082226;
      --muted: #2c5560;
      --accent: #1fc6ff;
      --accent-2: #1ee7a5;
      --border: #bce8e6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 0%, #b8efff, #f2fbff 50%, #e8fff7);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 18px 60px rgba(16, 118, 136, 0.15);
    }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { color: var(--muted); margin-bottom: 18px; line-height: 1.6; }
    label { display: block; font-size: 0.9rem; margin-bottom: 8px; font-weight: 600; }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
      margin-bottom: 14px;
      outline: none;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91, 92, 246, 0.15); }
    .btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .btn.secondary {
      margin-top: 10px;
      background: #f0fcff;
      color: #15555c;
      border: 1px solid var(--border);
    }
    .status {
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.88rem;
    }
    .status.error {
      background: #ffecec;
      color: #8e1e1e;
      border: 1px solid #ffc9c9;
    }
    .status.ok {
      background: #eafdf1;
      color: #1e6b40;
      border: 1px solid #b9efcf;
    }
    .meta {
      margin-top: 14px;
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Konvy Admin Panel</h1>
    <p>Manage the live LZT price multiplier used for account pricing.</p>

    {% if error %}
      <div class="status error">{{ error }}</div>
    {% endif %}
    {% if notice %}
      <div class="status ok">{{ notice }}</div>
    {% endif %}

    {% if not is_admin %}
      <form method="post">
        <input type="hidden" name="action" value="login">
        <label>Admin Password</label>
        <input name="password" type="password" required placeholder="Enter password">
        <button class="btn" type="submit">Unlock Admin</button>
      </form>
    {% else %}
      <form method="post">
        <input type="hidden" name="action" value="set_multiplier">
        <label>LZT Price Multiplier</label>
        <input
          name="multiplier"
          type="number"
          step="0.01"
          min="0.01"
          max="100"
          value="{{ current_multiplier }}"
          required
        >
        <button class="btn" type="submit">Save Multiplier</button>
      </form>

      <form method="post">
        <input type="hidden" name="action" value="logout">
        <button class="btn secondary" type="submit">Lock Admin Panel</button>
      </form>
    {% endif %}

    <div class="meta">Current multiplier: <strong>{{ current_multiplier }}x</strong></div>
  </div>
</body>
</html>
